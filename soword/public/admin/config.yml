# Decap CMS 設定
# 啟用前需完成 OAuth 設定：
#   1. GitHub → Settings → Developer settings → OAuth Apps → 新增 App
#   2. Homepage URL: https://thesoword.com
#   3. Authorization callback URL: https://api.netlify.com/auth/done
#   4. 在 Netlify 帳號啟用 Identity，連結此 GitHub repo

backend:
  name: github
  repo: mayoruna06/thesowordcom
  branch: main
  base_url: https://api.netlify.com

media_folder: soword/public/images/covers
public_folder: /images/covers

collections:
  - name: chapters
    label: 章節
    label_singular: 章節
    folder: soword/src/content/chapters
    create: true
    slug: "{{fields.work}}-ch{{fields.chapter}}"
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 所屬作品 slug, name: work, widget: string, hint: "例如 silent-echo" }
      - { label: 章節序號, name: chapter, widget: number, value_type: int, hint: "建議間隔 10（10, 20, 30...）" }
      - { label: 字數, name: wordCount, widget: number, required: false }
      - { label: 發布日期, name: publishedAt, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 正文, name: body, widget: markdown }

  - name: works
    label: 作品
    label_singular: 作品
    folder: soword/src/content/works
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    fields:
      - { label: 標題, name: title, widget: string }
      - label: 類型
        name: genre
        widget: select
        options:
          - { label: 言情, value: romance }
          - { label: 奇幻, value: fantasy }
          - { label: 科幻, value: sci-fi }
          - { label: 懸疑, value: thriller }
          - { label: 日常, value: slice-of-life }
          - { label: 其他, value: other }
      - label: 連載狀態
        name: status
        widget: select
        options:
          - { label: 連載中, value: ongoing }
          - { label: 已完結, value: completed }
          - { label: 暫停更新, value: hiatus }
          - { label: 草稿, value: draft }
      - { label: 簡介（200字以內）, name: summary, widget: string }
      - { label: 標籤, name: tags, widget: list, required: false }
      - { label: 精選, name: featured, widget: boolean, default: false }
      - { label: 發布日期, name: publishedAt, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 作品說明, name: body, widget: markdown }
