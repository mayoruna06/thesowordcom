<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasper no heya</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #1c1814;
    --bg2:   #231f19;
    --bg3:   #2c261e;
    --line:  #3c352b;
    --text:  #f0e8d8;
    --text2: #b8a898;
    --text3: #786e62;
    --amber:       #c49840;
    --amber-dark:  #a87e30;
    --green:       #28a870;
    --green-bright:#28a870;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 36px;
  }

  /* ── HERO ── */
  .hero {
    padding: 120px 0 88px;
    border-bottom: 1px solid var(--line);
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .hero-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 56px;
    font-weight: 300;
    letter-spacing: 0.1em;
    line-height: 1.1;
    margin-bottom: 22px;
  }

  .hero-bio {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.9;
    max-width: 480px;
    margin-bottom: 44px;
  }

  .btn-pdf {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 26px;
    border: 1px solid var(--line);
    background: var(--bg2);
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .btn-pdf:hover {
    border-color: var(--text3);
    color: var(--text);
    background: var(--bg3);
  }
  .btn-pdf svg { opacity: 0.45; }

  /* ── WORKS ── */
  .works {
    padding: 80px 0 100px;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }

  .card {
    position: relative;
    display: block;
    padding: 44px 38px;
    background: var(--bg);
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: background 0.2s;
  }
  .card:hover { background: var(--bg2); }

  /* accent bar: always visible, brighter on hover */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    opacity: 0.45;
    transition: opacity 0.25s;
  }
  .card--novel::before  { background: var(--amber-dark); }
  .card--resume::before { background: var(--green); }
  .card:hover::before   { opacity: 1; }

  .card-tag {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    display: block;
    margin: -44px -38px 22px;
    padding: 18px 38px;
  }
  .card--novel  .card-tag { color: var(--amber);       background: #2e2618; }
  .card--resume .card-tag { color: var(--green-bright); background: #182820; }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.1em;
    line-height: 1.2;
    margin-bottom: 14px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.85;
    margin-bottom: 36px;
  }

  .card-arrow {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text3);
    transition: color 0.2s, letter-spacing 0.2s;
  }
  .card:hover .card-arrow {
    color: var(--text2);
    letter-spacing: 0.18em;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 28px 0;
  }
  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-name {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.08em;
  }
  .footer-links {
    display: flex;
    gap: 24px;
  }
  .footer-links a, .footer-links .btn-copy-email {
    font-size: 12px;
    color: var(--text3);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }
  .footer-links a:hover, .footer-links .btn-copy-email:hover { color: var(--text2); }
  .btn-copy-email {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  #copy-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--bg3);
    border: 1px solid var(--line);
    color: var(--text2);
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 0.06em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    z-index: 3000;
  }
  #copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── HERO BUTTONS ── */
  .hero-btns {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-pdf {
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ── PDF PREVIEW MODAL ── */
  .pdf-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  .pdf-modal.open {
    opacity: 1;
    pointer-events: auto;
  }
  .pdf-modal-inner {
    width: min(820px, 94vw);
    height: min(88vh, 1060px);
    background: var(--bg2);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pdf-modal-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .pdf-modal-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .pdf-modal-actions { display: flex; gap: 8px; align-items: center; }
  .pdf-modal-dl {
    font-size: 11px;
    color: var(--green-bright);
    text-decoration: none;
    letter-spacing: 0.06em;
    border: 1px solid rgba(40,168,112,0.35);
    padding: 4px 12px;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .pdf-modal-dl:hover { background: rgba(40,168,112,0.15); border-color: var(--green-bright); }
  .pdf-modal-close {
    background: none;
    border: 1px solid var(--line);
    color: var(--text3);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 15px;
    border-radius: 3px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .pdf-modal-close:hover { border-color: var(--text2); color: var(--text); }
  .pdf-frame { flex: 1; border: none; width: 100%; background: #fff; }

  /* ── TOP BAR ── */
  .page-bar {
    height: 5px;
    background: linear-gradient(90deg, var(--amber) 50%, var(--green) 50%);
  }

  /* ── HERO CHIPS ── */
  .hero-chips {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  .hero-chip {
    height: 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .hero-chip.amber { width: 48px; background: var(--amber); }
  .hero-chip.green  { width: 28px; background: var(--green); }

  /* ── SECTION LABEL: colored square bullet ── */
  .section-label::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    margin-right: 10px;
    border-radius: 1px;
    vertical-align: middle;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .hero { padding: 72px 0 60px; }
    .hero-name { font-size: 38px; }
    .cards { grid-template-columns: 1fr; }
    .container { padding: 0 22px; }
  }
</style>
</head>
<body>

<div class="page-bar"></div>

<div class="container">

  <!-- HERO -->
  <section class="hero">
    <p class="hero-label">Personal · 個人</p>
    <h1 class="hero-name">勒索沃德</h1>
    <p class="hero-bio">[嘗試把文字與程式融合。]</p>
    <div class="hero-chips">
      <span class="hero-chip amber"></span>
      <span class="hero-chip green"></span>
    </div>
    <div class="hero-btns">
      <button class="btn-pdf" onclick="openPDF()">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
          <path d="M2 1h7l3 3v11H2V1z" stroke="currentColor" stroke-width="1.2"/>
          <path d="M9 1v3h3" stroke="currentColor" stroke-width="1.2"/>
          <path d="M4 8h6M4 11h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        預覽履歷
      </button>
      <a href="./resume.pdf" download class="btn-pdf">
        <svg width="12" height="14" viewBox="0 0 12 14" fill="none">
          <path d="M6 1v9M2 7l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 13h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        下載 PDF
      </a>
    </div>
  </section>

  <!-- WORKS -->
  <section class="works">
    <p class="section-label">Works · 作品</p>
    <div class="cards">

      <a href="/soword/" class="card card--novel">
        <p class="card-tag">Fiction · 小說</p>
        <h2 class="card-title">小書樓</h2>
        <p class="card-desc">喜歡幻想，然後實現。</p>
        <p class="card-arrow">前往 →</p>
      </a>

      <a href="./履歷編輯器.HTML" class="card card--resume">
        <p class="card-tag">Tool · 工具</p>
        <h2 class="card-title">履歷編輯器</h2>
        <p class="card-desc">因為我懶得拉canva，結果把自己用的更麻煩了。</p>
        <p class="card-arrow">前往 →</p>
      </a>

    </div>
  </section>

</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-inner">
      <span class="footer-name">勒索沃德</span>
      <div class="footer-links">
        <button class="btn-copy-email" onclick="copyEmail()">Email</button>
        <a href="https://github.com/mayoruna06" target="_blank">GitHub</a>
      </div>
    </div>
  </div>
</footer>

<div id="copy-toast">✓ 已複製信箱</div>

<!-- PDF Preview Modal -->
<div id="pdf-modal" class="pdf-modal" onclick="closePDFIfBg(event)">
  <div class="pdf-modal-inner">
    <div class="pdf-modal-bar">
      <span class="pdf-modal-title">履歷預覽</span>
      <div class="pdf-modal-actions">
        <a href="./resume.pdf" download class="pdf-modal-dl">↓ 下載</a>
        <button class="pdf-modal-close" onclick="closePDF()">✕</button>
      </div>
    </div>
    <iframe id="pdf-frame" class="pdf-frame" title="履歷預覽"></iframe>
  </div>
</div>

<script>
function openPDF() {
  const frame = document.getElementById('pdf-frame');
  if (!frame.src || frame.src === window.location.href) {
    frame.src = './resume.pdf';
  }
  document.getElementById('pdf-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePDF() {
  document.getElementById('pdf-modal').classList.remove('open');
  document.body.style.overflow = '';
}
function closePDFIfBg(e) {
  if (e.target === e.currentTarget) closePDF();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePDF(); });

function copyEmail() {
  const email = ['mayoruna06', 'gmail.com'].join('@');
  navigator.clipboard.writeText(email).then(() => {
    const t = document.getElementById('copy-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }).catch(() => {
    window.location.href = 'mailto:' + email;
  });
}
</script>

</body>
</html>
