<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小書樓 · 小說館</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --bg2: #eeeae0;
    --ink: #1a1714;
    --ink2: #5a5550;
    --ink3: #9a948e;
    --accent: #7a6a52;
    --accent2: #c4a882;
    --warm: #e8e0d0;
    --line: #d8d0c0;
    --tag-bg: #ede8df;
    --white: #fdfcfa;
    --red: #b05a4a;
    --green: #5a8060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ──── HEADER ──── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent2);
    border-radius: 50%;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  nav a {
    text-decoration: none;
    font-size: 14px;
    color: var(--ink2);
    font-weight: 400;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--ink); }

  .search-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 6px 14px;
    gap: 8px;
  }
  .search-wrap input {
    border: none;
    background: transparent;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
    outline: none;
    width: 140px;
  }
  .search-wrap input::placeholder { color: var(--ink3); }
  .search-wrap svg { color: var(--ink3); }

  /* ──── HERO BANNER ──── */
  .hero {
    background: linear-gradient(135deg, #2c2520 0%, #4a3d30 60%, #6b5740 100%);
    padding: 60px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hero-h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 36px;
    font-weight: 300;
    color: #f0ebe3;
    letter-spacing: 0.15em;
    line-height: 1.4;
  }
  .hero-sub {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(240,235,227,0.5);
    letter-spacing: 0.1em;
  }

  /* ──── MAIN LAYOUT ──── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ──── NOVEL GRID ──── */
  .novel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 24px;
  }

  .novel-card {
    cursor: pointer;
    transition: transform 0.25s ease;
  }
  .novel-card:hover { transform: translateY(-4px); }

  .cover-wrap {
    position: relative;
    aspect-ratio: 2/3;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12), 2px 2px 0 rgba(0,0,0,0.06);
  }
  .cover-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 空白封面設計 */
  .cover-blank {
    width: 100%; height: 100%;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    border: 1px solid var(--line);
  }
  .cover-blank::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid var(--line);
    border-radius: 2px;
    pointer-events: none;
  }
  .cover-blank-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.6;
    z-index: 1;
  }
  .cover-blank-author {
    position: absolute;
    bottom: 20px;
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.2em;
    z-index: 1;
  }
  .cover-blank-deco {
    position: absolute;
    top: 20px;
    right: 20px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--line);
  }

  .badge {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 3px 7px;
    border-radius: 2px;
    color: white;
  }
  .badge-new { background: var(--red); }
  .badge-update { background: var(--green); }
  .badge-end { background: var(--ink3); }

  .novel-info { padding: 10px 2px 0; }
  .novel-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
    letter-spacing: 0.05em;
  }
  .novel-meta {
    margin-top: 4px;
    font-size: 12px;
    color: var(--ink3);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ──── MAIN + SIDE ──── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 40px;
    padding: 48px 0;
  }

  .sidebar { display: flex; flex-direction: column; gap: 32px; }

  .sidebar-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
  }
  .sidebar-card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--ink2);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .rank-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--bg2);
    cursor: pointer;
  }
  .rank-item:last-child { border-bottom: none; }
  .rank-num {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--accent2);
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank-num.top { color: var(--red); }
  .rank-title {
    font-size: 13px;
    color: var(--ink);
    flex: 1;
    line-height: 1.3;
  }
  .rank-views { font-size: 11px; color: var(--ink3); }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-size: 12px;
    color: var(--accent);
    background: var(--tag-bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.2s;
  }
  .tag:hover { background: var(--warm); }

  /* ──── STATS BAR ──── */
  .stats-bar {
    background: var(--white);
    border-top: 1px solid var(--line);
    padding: 14px 40px;
    display: flex;
    justify-content: center;
    gap: 48px;
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 90;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink3);
    letter-spacing: 0.06em;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--ink2);
  }
  .stat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.5; transform:scale(0.8); }
  }

  /* ──── DETAIL PAGE ──── */
  .page { display: none; }
  .page.active { display: block; }

  .detail-hero {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 40px 0 0;
  }
  .detail-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 40px;
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 40px;
    align-items: start;
  }
  .detail-cover {
    aspect-ratio: 2/3;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .detail-cover-blank {
    width: 100%; height: 100%;
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
  }
  .detail-cover-blank::before {
    content: '';
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 1px solid var(--line);
  }
  .detail-cover-blank .ct {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 1.6;
    z-index: 1;
  }

  .detail-meta h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .detail-meta .author-line {
    font-size: 14px;
    color: var(--ink3);
    margin-bottom: 16px;
    letter-spacing: 0.08em;
  }
  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .detail-tag {
    font-size: 12px;
    padding: 3px 10px;
    background: var(--tag-bg);
    border: 1px solid var(--line);
    border-radius: 2px;
    color: var(--accent);
    letter-spacing: 0.06em;
  }

  .detail-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
  }
  .ds-item { text-align: center; }
  .ds-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    display: block;
  }
  .ds-label { font-size: 11px; color: var(--ink3); letter-spacing: 0.1em; }

  .detail-desc {
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink2);
    letter-spacing: 0.04em;
    margin-bottom: 24px;
    max-width: 560px;
  }

  .btn-read {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: var(--white);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    padding: 12px 28px;
    border-radius: 3px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    text-decoration: none;
  }
  .btn-read:hover { background: var(--accent); transform: translateY(-1px); }

  .btn-read-cont {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--ink2);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    padding: 12px 20px;
    border-radius: 3px;
    border: 1px solid var(--line);
    cursor: pointer;
    margin-left: 12px;
    transition: border-color 0.2s;
  }
  .btn-read-cont:hover { border-color: var(--accent); }

  /* ──── TABS ──── */
  .detail-tabs {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--line);
  }
  .tab-btn {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--ink3);
    padding: 14px 24px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s;
  }
  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* ──── CATALOGUE ──── */
  .catalogue-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 100px;
  }

  .volume-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .volume-title::before {
    content: '卷';
    font-size: 11px;
    background: var(--accent);
    color: white;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
  }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 2px;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .chapter-item:hover { background: var(--warm); }
  .chapter-item.new-ch::after {
    content: 'NEW';
    font-size: 9px;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 1px 4px;
    border-radius: 2px;
    letter-spacing: 0.06em;
    margin-left: auto;
  }
  .ch-num {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--ink3);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .ch-title {
    font-size: 13px;
    color: var(--ink2);
    letter-spacing: 0.04em;
    flex: 1;
  }
  .ch-date {
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.04em;
    margin-left: auto;
  }

  /* ──── READING PAGE ──── */
  .reading-bar {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .reading-bar-nav { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    font-size: 13px;
    color: var(--ink3);
    cursor: pointer;
    letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { color: var(--ink); }
  .breadcrumb {
    font-size: 13px;
    color: var(--ink3);
    letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 6px;
  }
  .breadcrumb span { color: var(--ink2); }

  .reading-controls { display: flex; gap: 12px; align-items: center; }
  .ctrl-btn {
    font-size: 12px;
    color: var(--ink3);
    cursor: pointer;
    padding: 5px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: transparent;
    letter-spacing: 0.06em;
    transition: border-color 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--ink); }

  .reading-content {
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 120px;
  }
  .chapter-heading {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .chapter-heading small {
    display: block;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--ink3);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .chapter-body {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    line-height: 2.2;
    color: var(--ink);
    letter-spacing: 0.06em;
  }
  .chapter-body p { margin-bottom: 1.8em; text-indent: 2em; }

  .chapter-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 60px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
  }
  .ch-nav-btn {
    font-size: 13px;
    color: var(--ink2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--white);
    letter-spacing: 0.08em;
    transition: border-color 0.2s, background 0.2s;
  }
  .ch-nav-btn:hover { border-color: var(--accent); background: var(--warm); }
  .ch-nav-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

  /* ──── ANNOUNCE ──── */
  .announce-list { display: flex; flex-direction: column; gap: 0; }
  .announce-item {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--bg2);
    cursor: pointer;
  }
  .announce-item:last-child { border-bottom: none; }
  .ann-date { font-size: 11px; color: var(--ink3); letter-spacing: 0.08em; white-space: nowrap; }
  .ann-title { font-size: 13px; color: var(--ink2); line-height: 1.4; }
  .ann-title:hover { color: var(--ink); }

  /* ──── SECTION WRAP ──── */
  .section-wrap { padding: 40px 0 20px; }

  /* ──── FONT SIZE control ──── */
  .font-size-sm .chapter-body { font-size: 15px; }
  .font-size-lg .chapter-body { font-size: 19px; }

  /* ──── BACK TO TOP ──── */
  .back-top {
    position: fixed;
    bottom: 72px;
    right: 24px;
    width: 40px; height: 40px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 80;
    color: var(--ink3);
    font-size: 16px;
  }
  .back-top.show { opacity: 1; }
  .back-top:hover { background: var(--warm); }

  /* ──── RESPONSIVE ──── */
  @media (max-width: 768px) {
    header { padding: 0 16px; }
    nav { display: none; }
    .hero { padding: 40px 20px; }
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .detail-inner { grid-template-columns: 130px 1fr; gap: 20px; }
    .stats-bar { gap: 24px; padding: 12px 20px; }
    .reading-content { padding: 40px 16px 100px; }
  }

  /* ──── FADE IN ──── */
  .fade-in {
    animation: fadeIn 0.35s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ──── COMMENT ──── */
  .comment-section { max-width: 720px; margin: 0 auto; padding: 0 24px 100px; }
  .comment-form textarea {
    width: 100%;
    height: 80px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--white);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .comment-form textarea:focus { border-color: var(--accent); }
  .comment-submit {
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
  }
  .btn-submit {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--white);
    background: var(--ink);
    border: none;
    padding: 9px 22px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: var(--accent); }
  .comment-list { margin-top: 28px; display: flex; flex-direction: column; gap: 16px; }
  .comment-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 14px 18px;
  }
  .comment-head { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .comment-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .comment-time { font-size: 11px; color: var(--ink3); }
  .comment-text { font-size: 13px; color: var(--ink2); line-height: 1.7; }
</style>
</head>
<body>

      <!-- SIDEBAR -->

      <span>今日瀏覽</span>
      <span class="stat-num" id="stat-today">—</span>

</div>

<!-- ═══════════ DETAIL PAGE ═══════════ -->
<div id="page-detail" class="page">
  <header>
    <div class="logo" onclick="goHome()">

    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

  <div class="detail-hero">

  <!-- TAB: Info -->

  <div class="stats-bar">

      <span>人</span>
    </div>
    <div class="stat-item">

<!-- ═══════════ READING PAGE ═══════════ -->
<div id="page-reading" class="page" id="reading-page-wrap">

    <div class="reading-bar-nav">

        ← 返回

    </div>
  </div>

  <div class="reading-content" id="reading-content-wrap">
    <div class="chapter-heading" id="chapter-heading"></div>
    <div class="chapter-body" id="chapter-body"></div>

      <button class="ch-nav-btn" id="btn-prev-ch" onclick="prevChapter()">← 上一章</button>
      <span style="font-size:12px;color:var(--ink3)" id="chapter-pos"></span>
      <button class="ch-nav-btn" id="btn-next-ch" onclick="nextChapter()">下一章 →</button>

  <div class="stats-bar">
    <div class="stat-item">
      <span>今日瀏覽</span>

    </div>
  </div>
</div>

<!-- Back to top -->
<div class="back-top" id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
// ══════════════════════════════════════
//  DATA  — 在這裡填入你的小說資料
//  章節內容將來從 API 讀取，此處留空
// ══════════════════════════════════════

const NOVELS = [
  {
    id: 1,
    title: '小說標題一',        // ← 改成你的書名
    author: '作者名',           // ← 改成你的筆名
    status: 'ongoing',          // ongoing | end
    tags: [],                   // ← 填入標籤，例如 ['奇幻', '冒險']
    desc: '',                   // ← 填入簡介
    chapters: 0,
    words: 0,
    views: 0,
    favs: 0,
    lastUpdate: '',
    volumes: [
      // 章節資料未來從 API 載入，暫時留空
      // {
      //   title: '第一卷',
      //   chapters: [
      //     { title: '第一章', date: 'YYYY-MM-DD', isNew: false, content: '' }
      //   ]
      // }
    ]
  },
  {
    id: 2,
    title: '小說標題二',
    author: '作者名',
    status: 'ongoing',
    tags: [],
    desc: '',
    chapters: 0,
    words: 0,
    views: 0,
    favs: 0,
    lastUpdate: '',
    volumes: []
  },
  {
    id: 4,
    title: '小說標題四',  // ← 改成你的書名
    author: '作者名',
    status: 'end',
    tags: [],
    desc: '',
    chapters: 0,
    words: 0,
    views: 0,
    favs: 0,
    lastUpdate: '',
    volumes: []
  }
];

// 排行榜 — 未來從 API 讀取，暫時留空
const RANKS = [];

// 公告 — 未來從 API 讀取，暫時留空
const ANNOUNCEMENTS = [];

// 標籤 — 根據你的書自行填入
const TAGS = [];

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════

let currentNovel = null;
let currentChapterIndex = 0;
let currentTab = 'catalogue';
let fontSize = 0; // -1, 0, 1
let comments = {};

// ══════════════════════════════════════
//  STATS — 使用 localStorage 模擬瀏覽數
// ══════════════════════════════════════

function getStats() {
  const today = new Date().toISOString().slice(0, 10);
  let s = JSON.parse(localStorage.getItem('novel_stats') || '{}');
  if (s.date !== today) {
    s = { date: today, today: 0, total: s.total || 0, novels: NOVELS.length };
  }
  return s;
}
function saveStats(s) { localStorage.setItem('novel_stats', JSON.stringify(s)); }
function addView() {
  let s = getStats();
  s.today++; s.total++;
  saveStats(s); return s;
}
function renderStats() {
  const s = getStats();
  const online = Math.floor(Math.random() * 8) + 1;
  ['stat-online','stat-online2'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = online; });
  ['stat-today','stat-today2','stat-today3'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = s.today.toLocaleString(); });
  const st = document.getElementById('stat-total'); if(st) st.textContent = s.total.toLocaleString();
  const sn = document.getElementById('stat-novels'); if(sn) sn.textContent = NOVELS.length;
}

// ══════════════════════════════════════
//  RENDER HOME
// ══════════════════════════════════════

function makeCard(novel) {
  const statusMap = { new: ['badge-new', 'NEW'], ongoing: ['badge-update', '連載中'], end: ['badge-end', '完結'] };
  const [cls, label] = statusMap[novel.status] || ['', ''];
  return `<div class="novel-card" onclick="openNovel(${novel.id})">
    <div class="cover-wrap">
      <div class="cover-blank">
        <div class="cover-blank-deco">✦</div>
        <div class="cover-blank-title">${novel.title}</div>
        <div class="cover-blank-author">${novel.author}</div>
      </div>
      ${cls ? `<span class="badge ${cls}">${label}</span>` : ''}
    </div>
    <div class="novel-info">
      <div class="novel-name">${novel.title}</div>
      <div class="novel-meta">
        <span>${novel.author}</span>·
        <span>${novel.tags[0]}</span>
      </div>
    </div>
  </div>`;
}

function renderHome() {
  const byStatus = { new: [], ongoing: [], end: [] };
  NOVELS.forEach(n => byStatus[n.status] && byStatus[n.status].push(n));

  // 連載中
  document.getElementById('novel-grid-ongoing').innerHTML = byStatus.ongoing.map(makeCard).join('');

  // 已完結
  const endNovels = byStatus.end || [];
  document.getElementById('novel-grid-end').innerHTML = endNovels.map(makeCard).join('');

  // 排行榜：有資料才顯示
  const rankCard = document.getElementById('rank-list');
  if (RANKS.length > 0) {
    rankCard.innerHTML = RANKS.map((r, i) => `
      <div class="rank-item" onclick="openNovel(${r.id})">
        <div class="rank-num ${i < 3 ? 'top' : ''}">${i + 1}</div>
        <div class="rank-title">${r.title}</div>
        <div class="rank-views">${r.views}</div>
      </div>`).join('');
    rankCard.closest('.sidebar-card').style.display = '';
  } else {
    rankCard.closest('.sidebar-card').style.display = 'none';
  }

  // 公告：固定顯示，無資料時顯示提示
  const annList = document.getElementById('announce-list');
  if (ANNOUNCEMENTS.length > 0) {
    annList.innerHTML = ANNOUNCEMENTS.map(a => `
      <div class="announce-item">
        <span class="ann-date">${a.date}</span>
        <span class="ann-title">${a.title}</span>
      </div>`).join('');
  } else {
    annList.innerHTML = '<div style="font-size:13px;color:var(--ink3);padding:4px 0">暫無公告</div>';
  }

  // 標籤雲：有標籤才顯示
  const tagCloud = document.getElementById('tag-cloud');
  if (TAGS.length > 0) {
    tagCloud.innerHTML = TAGS.map(t => `<span class="tag">${t}</span>`).join('');
    tagCloud.closest('.sidebar-card').style.display = '';
  } else {
    tagCloud.closest('.sidebar-card').style.display = 'none';
  }
}

// ══════════════════════════════════════
//  NOVEL DETAIL
// ══════════════════════════════════════

function openNovel(id) {
  currentNovel = NOVELS.find(n => n.id === id);
  if (!currentNovel) return;

  addView();

  document.getElementById('detail-cover-title').textContent = currentNovel.title;
  document.getElementById('detail-title').textContent = currentNovel.title;
  document.getElementById('detail-author').textContent = `作者：${currentNovel.author}　最後更新：${currentNovel.lastUpdate}`;
  document.getElementById('detail-chapters').textContent = currentNovel.chapters;
  document.getElementById('detail-words').textContent = currentNovel.words;
  document.getElementById('detail-views').textContent = currentNovel.views;
  document.getElementById('detail-favs').textContent = currentNovel.favs;
  document.getElementById('detail-desc').innerHTML = currentNovel.desc.replace(/\n/g, '<br>');
  document.getElementById('detail-tags').innerHTML = currentNovel.tags.map(t => `<span class="detail-tag">${t}</span>`).join('');

  // info table
  const infoRows = [
    ['書名', currentNovel.title],
    ['作者', currentNovel.author],
    ['狀態', { new: '新書上架', ongoing: '連載中', end: '已完結' }[currentNovel.status]],
    ['類型', currentNovel.tags.join('、')],
    ['字數', `${currentNovel.words} 萬字`],
    ['章節', `${currentNovel.chapters} 章`],
    ['最近更新', currentNovel.lastUpdate],
    ['瀏覽數', currentNovel.views],
  ];
  document.getElementById('info-table').innerHTML = infoRows.map(([k, v]) => `
    <tr style="border-bottom:1px solid var(--line)">
      <td style="padding:12px 0; color:var(--ink3); width:100px; letter-spacing:0.06em">${k}</td>
      <td style="padding:12px 0; color:var(--ink2)">${v}</td>
    </tr>`).join('');

  renderCatalogue();
  renderComments();
  switchTab('catalogue');
  showPage('page-detail');
  window.scrollTo(0, 0);
}

function renderCatalogue() {
  const wrap = document.getElementById('tab-catalogue');
  let html = '';
  currentNovel.volumes.forEach(vol => {
    html += `<div class="volume-title">${vol.title}</div>
    <div class="chapter-grid">`;
    vol.chapters.forEach((ch, idx) => {
      const globalIdx = getGlobalChapterIndex(vol, ch);
      html += `<div class="chapter-item${ch.isNew ? ' new-ch' : ''}" onclick="openChapter(${globalIdx})">
        <span class="ch-num">${globalIdx + 1}</span>
        <span class="ch-title">${ch.title}</span>
        <span class="ch-date">${ch.date}</span>
      </div>`;
    });
    html += '</div>';
  });
  wrap.innerHTML = html;
}

function getGlobalChapterIndex(targetVol, targetCh) {
  let idx = 0;
  for (const vol of currentNovel.volumes) {
    for (const ch of vol.chapters) {
      if (ch === targetCh) return idx;
      idx++;
    }
  }
  return 0;
}

function getAllChapters() {
  const all = [];
  currentNovel.volumes.forEach(vol => vol.chapters.forEach(ch => all.push({ ...ch, volTitle: vol.title })));
  return all;
}

// ══════════════════════════════════════
//  READING
// ══════════════════════════════════════

function openChapter(idx) {
  const all = getAllChapters();
  if (idx < 0 || idx >= all.length) return;
  currentChapterIndex = idx;
  const ch = all[idx];

  addView();

  document.getElementById('reading-breadcrumb').innerHTML = `<span>${currentNovel.title}</span> / ${ch.volTitle} / ${ch.title}`;
  document.getElementById('chapter-heading').innerHTML = `<small>${ch.volTitle}</small>${ch.title}`;
  document.getElementById('chapter-body').innerHTML = ch.content.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');
  document.getElementById('chapter-pos').textContent = `${idx + 1} / ${all.length}`;

  const prevBtn = document.getElementById('btn-prev-ch');
  const nextBtn = document.getElementById('btn-next-ch');
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === all.length - 1;

  // Apply font size
  const body = document.getElementById('reading-content-wrap');
  body.className = fontSize === -1 ? 'reading-content font-size-sm' : fontSize === 1 ? 'reading-content font-size-lg' : 'reading-content';

  showPage('page-reading');
  window.scrollTo(0, 0);
  renderStats();
}

function openChapterLast() {
  const all = getAllChapters();
  openChapter(all.length - 1);
}

function prevChapter() { openChapter(currentChapterIndex - 1); }
function nextChapter() { openChapter(currentChapterIndex + 1); }

function changeFontSize(dir) {
  fontSize = Math.max(-1, Math.min(1, fontSize + dir));
  const body = document.getElementById('reading-content-wrap');
  body.className = fontSize === -1 ? 'reading-content font-size-sm' : fontSize === 1 ? 'reading-content font-size-lg' : 'reading-content';
}

let darkBg = false;
function toggleBg() {
  darkBg = !darkBg;
  document.getElementById('page-reading').style.background = darkBg ? '#1e1c18' : '';
  document.getElementById('reading-content-wrap').style.color = darkBg ? '#ccc9be' : '';
}

// ══════════════════════════════════════
//  COMMENTS
// ══════════════════════════════════════

function renderComments() {
  const list = comments[currentNovel.id] || [];
  document.getElementById('comment-count').textContent = list.length ? `(${list.length})` : '';
  document.getElementById('comment-list').innerHTML = list.map(c => `
    <div class="comment-card">
      <div class="comment-head">
        <span class="comment-name">${c.name}</span>
        <span class="comment-time">${c.time}</span>
      </div>
      <div class="comment-text">${c.text}</div>
    </div>`).join('') || '<div style="color:var(--ink3);font-size:13px;padding:16px 0">還沒有評論，來做第一個吧！</div>';
}

function submitComment() {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  if (!comments[currentNovel.id]) comments[currentNovel.id] = [];
  comments[currentNovel.id].unshift({
    name: '讀者',
    time: new Date().toLocaleDateString('zh-TW'),
    text
  });
  input.value = '';
  renderComments();
}

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['catalogue', 'comment', 'info'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.getElementById('tab-catalogue').style.display = tab === 'catalogue' ? '' : 'none';
  document.getElementById('tab-comment').style.display = tab === 'comment' ? '' : 'none';
  document.getElementById('tab-info').style.display = tab === 'info' ? '' : 'none';
}

// ══════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showPage('page-home');
  window.scrollTo(0, 0);
  renderStats();
}

function backToDetail() {
  showPage('page-detail');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════
//  BACK TO TOP
// ══════════════════════════════════════

window.addEventListener('scroll', () => {
  const btn = document.getElementById('back-top');
  btn.classList.toggle('show', window.scrollY > 300);
});

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  // 清除舊的假數據，從零開始計真實流量
  const stored = JSON.parse(localStorage.getItem('novel_stats') || '{}');
  if (stored.total > 50000) {
    // 如果發現不合理的舊數字，重置
    localStorage.removeItem('novel_stats');
  }
  addView();
  renderHome();
  renderStats();
  // Refresh online count every 30s
  setInterval(() => {
    const online = Math.floor(Math.random() * 8) + 1;
    ['stat-online','stat-online2'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = online; });
  }, 30000);
});
</script>
</body>
</html>
