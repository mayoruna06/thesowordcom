name: Deploy 小書樓 (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: soword/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: soword
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: soword
        run: pnpm run check

      - name: Build site
        working-directory: soword
        run: pnpm run build
        env:
          SITE: 'https://thesoword.com'

      - name: Assemble site (root files + soword)
        run: |
          mkdir -p _site
          cp index.html resume.pdf 履歷編輯器.HTML _site/
          cp -r dist/soword _site/soword
          cp dist/soword/404.html _site/404.html || true
          touch _site/.nojekyll
          echo thesoword.com > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
