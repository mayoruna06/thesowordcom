name: 小書樓外部健康監控

on:
  schedule:
    - cron: '2-57/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: soword-external-uptime
  cancel-in-progress: false

jobs:
  monitor:
    name: Check reader, admin and public API
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check each endpoint three times
        id: check
        shell: bash
        run: |
          set -u
          failed=()

          check_endpoint() {
            local name=$1 url=$2 validator=$3 response attempt
            for attempt in 1 2 3; do
              if response=$(curl --fail --silent --show-error \
                --connect-timeout 5 --max-time 10 "$url"); then
                if { [[ "$validator" == array ]] && jq -e 'type == "array"' <<<"$response" > /dev/null; } || \
                   { [[ "$validator" != array ]] && grep -Fq "$validator" <<<"$response"; }; then
                  echo "PASS $name (attempt $attempt)"
                  return 0
                fi
              fi
              echo "FAIL $name (attempt $attempt)" >&2
              [[ "$attempt" == 3 ]] || sleep 15
            done
            failed+=("$name — $url")
          }

          check_endpoint '讀者站' 'https://thesoword.com/soword/' '小書樓'
          check_endpoint '作者後台' 'https://admin.thesoword.com/' '小書樓'
          check_endpoint '公開 API' \
            'https://admin.thesoword.com/api/reader/search?q=uptime-monitor-probe' array

          {
            echo 'failed<<EOF'
            printf '%s\n' "${failed[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open or close the uptime incident
        uses: actions/github-script@v7
        env:
          FAILED_ENDPOINTS: ${{ steps.check.outputs.failed }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'uptime-alert';
            const title = '[監控] 小書樓外部服務異常';
            const failed = (process.env.FAILED_ENDPOINTS || '').trim();

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: 'B60205',
                description: '外部健康監控連續三次失敗',
              });
            }

            const openIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', labels: label, per_page: 100 },
            );
            const incident = openIssues.find((issue) => issue.title === title);
            const checkedAt = new Date().toISOString();

            if (failed && !incident) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                labels: [label],
                body: [
                  '外部監控在同一次執行中連續三次無法通過以下檢查：',
                  '',
                  ...failed.split('\n').map((item) => `- ${item}`),
                  '',
                  `檢查時間：${checkedAt}`,
                  '',
                  '此流程只通知，不會自動重啟或修改正式環境。',
                ].join('\n'),
              });
            } else if (!failed && incident) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: incident.number,
                body: `三個外部端點皆已恢復。恢復確認時間：${checkedAt}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: incident.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      - name: Mark the run failed when an incident is open
        if: steps.check.outputs.failed != ''
        env:
          FAILED_ENDPOINTS: ${{ steps.check.outputs.failed }}
        run: |
          echo "$FAILED_ENDPOINTS" >&2
          exit 1
