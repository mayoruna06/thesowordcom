name: Deploy 根目錄靜態檔

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - '履歷編輯器.HTML'
      - 'novel_site.html'
      - '.github/workflows/deploy-root.yml'
  workflow_dispatch:

concurrency:
  group: deploy-root-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy Root Files to S3
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Deploy index.html
        run: |
          aws s3 cp index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Deploy 履歷編輯器
        run: |
          aws s3 cp "履歷編輯器.HTML" "s3://${{ secrets.S3_BUCKET_NAME }}/履歷編輯器.HTML" \
            --cache-control "public, max-age=3600" \
            --content-type "text/html; charset=utf-8"

      - name: Deploy novel_site.html
        run: |
          aws s3 cp novel_site.html s3://${{ secrets.S3_BUCKET_NAME }}/novel_site.html \
            --cache-control "public, max-age=3600" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront root cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/%E5%B1%A5%E6%AD%B7%E7%B7%A8%E8%BC%AF%E5%99%A8.HTML" "/novel_site.html" "/"
